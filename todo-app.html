<!DOCTYPE html>
<html>
<head>

<title>Afterhours — Task Desk</title>
<style>
  :root{
    --bg: #0f1016;
    --bg-glow: radial-gradient(ellipse 900px 500px at 50% -10%, rgba(242,161,84,0.14), transparent 60%);
    --surface: #191b26;
    --surface-2: #20222f;
    --surface-hover: #262939;
    --border: #2b2e3d;
    --text: #ecebf2;
    --text-muted: #8d8ca3;
    --text-faint: #5c5b71;
    --accent: #f2a154;
    --accent-soft: rgba(242,161,84,0.14);
    --accent-strong: #f7b978;
    --violet: #8b7fd6;
    --danger: #e2637a;
    --danger-soft: rgba(226,99,122,0.14);
    --success: #6fcf97;
    --success-soft: rgba(111,207,151,0.14);
    --radius-lg: 18px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }

  body{
    min-height:100vh;
    background: var(--bg-glow), var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    padding: 48px 20px 80px;
  }

  .app{
    max-width: 640px;
    margin: 0 auto;
  }

  /* Header */
  .header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom: 32px;
    gap: 16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap: 12px;
  }
  .brand-lamp{
    width: 34px; height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--accent-strong), var(--accent) 55%, #b3671f 100%);
    box-shadow: 0 0 22px 4px rgba(242,161,84,0.45);
    flex-shrink:0;
  }
  .brand h1{
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .brand p{
    margin: 2px 0 0;
    font-size: 12.5px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .clock{
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    text-align: right;
    white-space: nowrap;
  }
  .clock .time{
    display:block;
    font-size: 20px;
    color: var(--accent-strong);
    font-weight: 500;
  }

  /* Composer card */
  .composer{
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-bottom: 28px;
    box-shadow: 0 20px 40px -24px rgba(0,0,0,0.6);
  }
  .composer-input{
    width:100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 500;
    padding: 6px 4px 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .composer-input::placeholder{ color: var(--text-faint); font-weight: 400; }

  .composer-row{
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items:center;
  }
  .field{
    display:flex;
    align-items:center;
    gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }
  .field svg{ width:15px; height:15px; color: var(--text-muted); flex-shrink:0; }
  .field input[type="date"],
  .field input[type="time"],
  .field select{
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    color-scheme: dark;
    min-width: 0;
  }
  .field select{ font-family: var(--font-body); font-size: 13px; cursor:pointer; }

  .priority-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .p-low .priority-dot{ background: var(--text-muted); }
  .p-medium .priority-dot{ background: var(--accent); }
  .p-high .priority-dot{ background: var(--danger); }

  .add-btn{
    margin-left: auto;
    background: linear-gradient(180deg, var(--accent-strong), var(--accent));
    color: #201202;
    border: none;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 8px 18px -8px rgba(242,161,84,0.6);
  }
  .add-btn:hover{ transform: translateY(-1px); box-shadow: 0 10px 22px -8px rgba(242,161,84,0.75); }
  .add-btn:active{ transform: translateY(0); }

  /* Stats / filters */
  .toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 18px;
  }
  .counter{
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .counter b{ color: var(--text); font-weight: 500; }

  .filters{
    display:flex;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px;
    border-radius: 999px;
  }
  .filter-btn{
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .filter-btn.active{
    background: var(--accent-soft);
    color: var(--accent-strong);
  }
  .filter-btn:hover:not(.active){ color: var(--text); }

  /* Task list grouped by date */
  .group-label{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 22px 0 10px;
    padding-left: 4px;
  }
  .group-label:first-child{ margin-top: 0; }

  .task-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }

  .task{
    position: relative;
    display:flex;
    align-items:flex-start;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radi	us: var(--radius-md);
    padding: 14px 14px 14px 0;
    animation: rise 0.28s ease;
    overflow: hidden;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .task:hover{ border-color: #383c50; }
  .task::before{
    content:"";
    width: 4px;
    align-self: stretch;
    border-radius: 4px;
    margin-right: 2px;
  }
  .task.p-low::before{ background: var(--text-faint); }
  .task.p-medium::before{ background: var(--accent); }
  .task.p-high::before{ background: var(--danger); }

  @keyframes rise{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .task.removing{
    animation: fadeOut 0.22s ease forwards;
  }
  @keyframes fadeOut{
    to{ opacity:0; transform: translateX(12px) scale(0.98); }
  }

  .check-btn{
    flex-shrink:0;
    width: 22px; height: 22px;
    margin-top: 2px;
    border-radius: 50%;
    border: 1.5px solid var(--text-faint);
    background: transparent;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all 0.15s ease;
  }
  .check-btn svg{ width:12px; height:12px; opacity:0; transform: scale(0.6); transition: all 0.15s ease; color:#0f1016; }
  .task.done .check-btn{ background: var(--success); border-color: var(--success); }
  .task.done .check-btn svg{ opacity:1; transform: scale(1); }

  .task-body{ flex:1; min-width:0; }
  .task-text{
    font-family: var(--font-display);
    font-size: 15.5px;
    font-weight: 500;
    line-height:1.4;
    word-break: break-word;
  }
  .task.done .task-text{
    color: var(--text-faint);
    text-decoration: line-through;
    text-decoration-color: var(--text-faint);
  }
  .task-meta{
    display:flex;
    align-items:center;
    gap: 10px;
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-muted);
  }
  .task-meta svg{ width:11px; height:11px; vertical-align:-1px; margin-right:3px; }
  .task.done .task-meta{ color: var(--text-faint); }
  .overdue{ color: var(--danger); }

  .task-edit-input{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 15px;
    padding: 6px 8px;
    outline:none;
  }

  .task-actions{
    display:flex;
    gap: 4px;
    flex-shrink:0;
  }
  .icon-btn{
    width: 28px; height: 28px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: all 0.15s ease;
  }
  .icon-btn svg{ width:14px; height:14px; }
  .icon-btn:hover{ background: var(--surface-hover); color: var(--text); }
  .icon-btn.delete:hover{ background: var(--danger-soft); color: var(--danger); }
  .icon-btn.save:hover{ background: var(--success-soft); color: var(--success); }

  /* Empty state */
  .empty{
    text-align:center;
    padding: 56px 20px;
    color: var(--text-faint);
  }
  .empty svg{ width:40px; height:40px; margin-bottom:14px; color: var(--text-faint); }
  .empty p{ font-family: var(--font-display); font-size:15px; margin:0 0 4px; color: var(--text-muted); }
  .empty span{ font-size:12.5px; }

  @media (max-width: 480px){
    body{ padding: 28px 14px 60px; }
    .header{ flex-direction:column; align-items:flex-start; gap:14px; }
    .clock{ text-align:left; }
    .add-btn{ width:100%; margin-left:0; order:5; }
    .field{ flex:1; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="brand">
      <div class="brand-lamp"></div>
      <div>
        <h1>Task Managment</h1>
        <p>your late-night task desk</p>
      </div>
    </div>
    <div class="clock">
      <span class="time" id="clockTime">--:--</span>
      <span id="clockDate">—</span>
    </div>
  </div>

  <div class="composer">
    <input type="text" id="taskInput" class="composer-input" placeholder="What needs doing?" maxlength="140" />
    <div class="composer-row">
      <label class="field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
        <input type="date" id="dateInput" />
      </label>
      <label class="field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <input type="time" id="timeInput" />
      </label>
      <label class="field p-medium" id="priorityField">
        <span class="priority-dot"></span>
        <select id="priorityInput">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </label>
      <button class="add-btn" id="addBtn">Add task</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="counter"><b id="countActive">0</b> open &nbsp;·&nbsp; <b id="countDone">0</b> done</div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>
  </div>

  <div id="listContainer"></div>

</div>

<script>
(function(){
  const STORAGE_KEY = 'afterhours_tasks_v1';
  let tasks = [];
  let filter = 'all';

  const taskInput = document.getElementById('taskInput');
  const dateInput = document.getElementById('dateInput');
  const timeInput = document.getElementById('timeInput');
  const priorityInput = document.getElementById('priorityInput');
  const priorityField = document.getElementById('priorityField');
  const addBtn = document.getElementById('addBtn');
  const listContainer = document.getElementById('listContainer');
  const countActive = document.getElementById('countActive');
  const countDone = document.getElementById('countDone');

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : [];
    }catch(e){ tasks = []; }
  }
  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }catch(e){}
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  priorityInput.addEventListener('change', () => {
    priorityField.classList.remove('p-low','p-medium','p-high');
    priorityField.classList.add('p-' + priorityInput.value);
  });

  function addTask(){
    const text = taskInput.value.trim();
    if(!text) { taskInput.focus(); return; }
    tasks.unshift({
      id: uid(),
      text,
      date: dateInput.value || '',
      time: timeInput.value || '',
      priority: priorityInput.value,
      done: false,
      createdAt: Date.now()
    });
    taskInput.value = '';
    dateInput.value = '';
    timeInput.value = '';
    priorityInput.value = 'medium';
    priorityField.classList.remove('p-low','p-high');
    priorityField.classList.add('p-medium');
    save();
    render();
    taskInput.focus();
  }

  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if(e.key === 'Enter') addTask(); });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  function fmtDateLabel(dateStr){
    if(!dateStr) return 'No date';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr + 'T00:00:00');
    const diffDays = Math.round((d - today) / 86400000);
    if(diffDays === 0) return 'Today';
    if(diffDays === 1) return 'Tomorrow';
    if(diffDays === -1) return 'Yesterday';
    return d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
  }

  function fmtTime(t){
    if(!t) return '';
    const [h,m] = t.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const h12 = ((h + 11) % 12) + 1;
    return `${h12}:${String(m).padStart(2,'0')} ${period}`;
  }

  function isOverdue(task){
    if(task.done || !task.date) return false;
    const now = new Date();
    const dt = new Date(task.date + 'T' + (task.time || '23:59'));
    return dt < now;
  }

  const clockIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';
  const calIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>';

  function groupTasks(list){
    const groups = {};
    const order = [];
    list.forEach(t => {
      const key = t.date || 'no-date';
      if(!groups[key]){ groups[key] = []; order.push(key); }
      groups[key].push(t);
    });
    order.sort((a,b) => {
      if(a === 'no-date') return 1;
      if(b === 'no-date') return -1;
      return a.localeCompare(b);
    });
    return order.map(key => ({ key, label: key === 'no-date' ? 'No date' : fmtDateLabel(key), items: groups[key] }));
  }

  function render(){
    let filtered = tasks;
    if(filter === 'active') filtered = tasks.filter(t => !t.done);
    if(filter === 'done') filtered = tasks.filter(t => t.done);

    countActive.textContent = tasks.filter(t => !t.done).length;
    countDone.textContent = tasks.filter(t => t.done).length;

    if(filtered.length === 0){
      listContainer.innerHTML = `
        <div class="empty">
          ${clockIcon.replace('stroke-width="2"','stroke-width="1.3"')}
          <p>${tasks.length === 0 ? 'Nothing on the desk yet' : 'Nothing here'}</p>
          <span>${tasks.length === 0 ? 'Add your first task above to get started' : 'Try a different filter'}</span>
        </div>`;
      return;
    }

    const groups = groupTasks(filtered);
    listContainer.innerHTML = groups.map(group => `
      <div class="group-label">${group.label}</div>
      <ul class="task-list">
        ${group.items.map(renderTask).join('')}
      </ul>
    `).join('');

    // wire events
    listContainer.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', onAction);
    });
    listContainer.querySelectorAll('.task-edit-input').forEach(el => {
      el.addEventListener('keydown', e => {
        if(e.key === 'Enter'){ commitEdit(el.closest('.task').dataset.id, el.value); }
        if(e.key === 'Escape'){ render(); }
      });
      el.addEventListener('blur', () => commitEdit(el.closest('.task').dataset.id, el.value));
    });
  }

  function renderTask(t){
    const overdue = isOverdue(t);
    const metaBits = [];
    if(t.time) metaBits.push(`${clockIcon}${fmtTime(t.time)}`);
    metaBits.push(t.priority.charAt(0).toUpperCase() + t.priority.slice(1) + ' priority');
    return `
      <li class="task p-${t.priority} ${t.done ? 'done' : ''}" data-id="${t.id}">
        <button class="check-btn" data-action="toggle" title="Mark ${t.done ? 'active' : 'done'}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        </button>
        <div class="task-body">
          <div class="task-text" data-role="text">${escapeHtml(t.text)}</div>
          <div class="task-meta ${overdue ? 'overdue' : ''}">
            ${overdue ? 'Overdue · ' : ''}${metaBits.join(' &nbsp;·&nbsp; ')}
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" data-action="edit" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
          <button class="icon-btn delete" data-action="delete" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
          </button>
        </div>
      </li>
    `;
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function onAction(e){
    const btn = e.currentTarget;
    const li = btn.closest('.task');
    const id = li.dataset.id;
    const action = btn.dataset.action;

    if(action === 'toggle'){
      const t = tasks.find(t => t.id === id);
      t.done = !t.done;
      save();
      render();
    }
    if(action === 'delete'){
      li.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, 200);
    }
    if(action === 'edit'){
      const t = tasks.find(t => t.id === id);
      const textEl = li.querySelector('[data-role="text"]');
      textEl.outerHTML = `<input type="text" class="task-edit-input" value="${escapeHtml(t.text)}" maxlength="140" />`;
      const input = li.querySelector('.task-edit-input');
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }
  }

  function commitEdit(id, value){
    const trimmed = value.trim();
    const t = tasks.find(t => t.id === id);
    if(trimmed) t.text = trimmed;
    save();
    render();
  }

  // Live clock
  function tickClock(){
    const now = new Date();
    document.getElementById('clockTime').textContent = now.toLocaleTimeString(undefined, { hour: '2-digit', minute:'2-digit' });
    document.getElementById('clockDate').textContent = now.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });
  }
  tickClock();
  setInterval(tickClock, 1000 * 30);
  setInterval(render, 1000 * 60); // refresh overdue/relative labels

  // init
  load();
  render();
})();
</script>

</body>
</html>
